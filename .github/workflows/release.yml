name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., v0.2.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Validate version format
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Version must match format v*.*.* (e.g., v0.2.0)"
            exit 1
          fi

      - name: Check tag doesn't exist
        run: |
          if git rev-parse "${{ inputs.version }}" >/dev/null 2>&1; then
            echo "Error: Tag ${{ inputs.version }} already exists"
            exit 1
          fi

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - name: Install ALSA
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Run tests
        run: go test -v -race ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  build:
    needs: validate
    strategy:
      matrix:
        include:
          - { goos: linux, goarch: amd64, runner: ubuntu-latest }
          - { goos: darwin, goarch: amd64, runner: macos-latest }
          - { goos: darwin, goarch: arm64, runner: macos-latest }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - name: Install ALSA (Linux only)
        if: matrix.goos == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Build
        env:
          CGO_ENABLED: ${{ matrix.goos == 'linux' && '1' || '0' }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags "-s -w -X main.version=${{ inputs.version }} -X main.commit=${GITHUB_SHA::7} -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" -o somatui_${{ matrix.goos }}_${{ matrix.goarch }} ./cmd/somatui

      - uses: actions/upload-artifact@v7
        with:
          name: somatui-${{ matrix.goos }}-${{ matrix.goarch }}
          path: somatui_${{ matrix.goos }}_${{ matrix.goarch }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$PREVIOUS_TAG" ]; then
            echo "Changes since $PREVIOUS_TAG:"
            COMMITS=$(git log --pretty=format:"- %s (%h)" "$PREVIOUS_TAG"..HEAD)
          else
            echo "Initial release"
            COMMITS=$(git log --pretty=format:"- %s (%h)")
          fi
          {
            echo "body<<EOF"
            echo "## Changes"
            echo ""
            if [ -n "$PREVIOUS_TAG" ]; then
              echo "Changes since $PREVIOUS_TAG:"
            fi
            echo ""
            echo "$COMMITS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ inputs.version }}" -m "Release ${{ inputs.version }}"
          git push origin "${{ inputs.version }}"

      - uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: somatui-*
          merge-multiple: true

      - name: Generate checksums
        run: cd dist && sha256sum somatui_* > checksums.txt

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.version }}
          body: ${{ steps.changelog.outputs.body }}
          files: dist/*

  homebrew:
    name: Update Homebrew tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download checksums
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download "${{ inputs.version }}" --repo "${{ github.repository }}" --pattern checksums.txt

      - name: Check out tap
        uses: actions/checkout@v7
        with:
          repository: samuelb/homebrew-somatui
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Render formula
        run: |
          VERSION="${{ inputs.version }}"
          BARE="${VERSION#v}"
          sha() { grep " $1\$" checksums.txt | awk '{print $1}'; }
          DARWIN_ARM64="$(sha somatui_darwin_arm64)"
          DARWIN_AMD64="$(sha somatui_darwin_amd64)"
          LINUX_AMD64="$(sha somatui_linux_amd64)"
          if [ -z "$DARWIN_ARM64" ] || [ -z "$DARWIN_AMD64" ] || [ -z "$LINUX_AMD64" ]; then
            echo "Error: missing a checksum for one or more binaries" >&2
            cat checksums.txt >&2
            exit 1
          fi
          mkdir -p tap/Formula
          cat > tap/Formula/somatui.rb <<EOF
          class Somatui < Formula
            desc "Terminal UI client for streaming SomaFM radio channels"
            homepage "https://github.com/samuelb/somatui"
            version "${BARE}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/samuelb/somatui/releases/download/${VERSION}/somatui_darwin_arm64"
                sha256 "${DARWIN_ARM64}"
              end
              on_intel do
                url "https://github.com/samuelb/somatui/releases/download/${VERSION}/somatui_darwin_amd64"
                sha256 "${DARWIN_AMD64}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/samuelb/somatui/releases/download/${VERSION}/somatui_linux_amd64"
                sha256 "${LINUX_AMD64}"
              end
            end

            def install
              bin.install Dir["somatui_*"].first => "somatui"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/somatui --version")
            end
          end
          EOF

      - name: Commit and push
        run: |
          cd tap
          if git diff --quiet -- Formula/somatui.rb; then
            echo "Formula already up to date; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/somatui.rb
          git commit -m "somatui ${{ inputs.version }}"
          git push
