name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump (auto derives it from conventional commits)"
        type: choice
        options:
          - auto
          - patch
          - minor
          - major
        default: auto
      dry_run:
        description: "Build and render release artifacts without publishing"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------- Prepare
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.cliff.outputs.version }}
      sha: ${{ steps.bump.outputs.sha }}
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history + tags: git-cliff derives the next version from
          # conventional commits since the last tag.
          fetch-depth: 0

      - name: Compute next version and release notes
        id: cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --bump=${{ inputs.bump }} --unreleased
        env:
          OUTPUT: release-notes.md

      - name: Validate computed tag
        env:
          TAG: ${{ steps.cliff.outputs.version }}
        run: |
          echo "Next version: $TAG"
          if ! printf '%s' "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::git-cliff computed '$TAG', expected vX.Y.Z"; exit 1
          fi

      - name: Check tag doesn't exist
        if: inputs.dry_run == false
        env:
          TAG: ${{ steps.cliff.outputs.version }}
        run: |
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "::error::Tag '$TAG' already exists — nothing releasable since the last release?"
            exit 1
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: release-notes
          path: release-notes.md
          if-no-files-found: error

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Install ALSA
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Run tests
        run: go test -v -race ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

      # Keep the version recorded in flake.nix in sync with the release. On a
      # dry run the bump is rendered and discarded; on a real run it is
      # committed to the branch and the release is cut from that commit.
      - name: Bump version
        id: bump
        env:
          VERSION: ${{ steps.cliff.outputs.version }}
        run: |
          scripts/bump-version.sh "${VERSION#v}"
          if git diff --quiet; then
            echo "Version metadata already at ${VERSION#v}; nothing to bump."
          elif [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "Dry run: discarding the version bump."
            git checkout -- .
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -am "Release $VERSION"
            git push origin "HEAD:$GITHUB_REF_NAME"
          fi
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------- Linux
  build:
    name: Linux ${{ matrix.goarch }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux, goarch: amd64, runner: ubuntu-latest }
          - { goos: linux, goarch: arm64, runner: ubuntu-24.04-arm }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Install ALSA
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Build
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags "-s -w -X main.version=${{ needs.prepare.outputs.tag }} -X main.commit=${GITHUB_SHA::7} -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" -o soma_${{ matrix.goos }}_${{ matrix.goarch }} ./cmd/soma

      - uses: actions/upload-artifact@v7
        with:
          name: soma-${{ matrix.goos }}-${{ matrix.goarch }}
          path: soma_${{ matrix.goos }}_${{ matrix.goarch }}
          if-no-files-found: error

  # ---------------------------------------------------------------- macOS (universal)
  build-darwin:
    name: macOS (universal)
    needs: prepare
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Build universal binary
        # CGO is required on macOS for the menu-bar tray (Cocoa). The runner is
        # Apple Silicon, so the amd64 slice is a cgo cross-compile via clang's
        # -arch; the macOS SDK ships universal libraries so both slices link.
        env:
          CGO_ENABLED: 1
          GOOS: darwin
        run: |
          LDFLAGS="-s -w -X main.version=${{ needs.prepare.outputs.tag }} -X main.commit=${GITHUB_SHA::7} -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          GOARCH=arm64 CC="clang -arch arm64" go build -ldflags "$LDFLAGS" -o soma_darwin_arm64 ./cmd/soma
          GOARCH=amd64 CC="clang -arch x86_64" go build -ldflags "$LDFLAGS" -o soma_darwin_amd64 ./cmd/soma
          mkdir -p dist
          lipo -create -output dist/soma_darwin_universal soma_darwin_amd64 soma_darwin_arm64
          lipo -info dist/soma_darwin_universal

      - name: Build .dmg
        run: packaging/macos/build-dmg.sh dist/soma_darwin_universal dist

      - uses: actions/upload-artifact@v7
        with:
          name: soma-darwin
          path: dist/*
          if-no-files-found: error

  # ---------------------------------------------------------------- Publish
  release:
    name: Publish release
    needs: [prepare, build, build-darwin]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Download release notes
        uses: actions/download-artifact@v8
        with:
          name: release-notes

      - name: Show release notes
        run: cat release-notes.md

      - name: Create tag
        if: inputs.dry_run == false
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: soma-*
          merge-multiple: true

      - name: Install nfpm
        env:
          NFPM_TOOL_VERSION: "2.43.0"
        run: |
          curl -fsSL -o /tmp/nfpm.deb \
            "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_TOOL_VERSION}/nfpm_${NFPM_TOOL_VERSION}_amd64.deb"
          sudo dpkg -i /tmp/nfpm.deb

      - name: Build .deb and .rpm packages
        env:
          VERSION: ${{ needs.prepare.outputs.tag }}
        run: |
          export NFPM_VERSION="${VERSION#v}"
          for arch in amd64 arm64; do
            rpmarch=$([ "$arch" = amd64 ] && echo x86_64 || echo aarch64)
            chmod +x "dist/soma_linux_${arch}"
            NFPM_ARCH="$arch" NFPM_BINARY="dist/soma_linux_${arch}" \
              nfpm package -f packaging/nfpm.yaml -p deb -t "dist/somad_${NFPM_VERSION}_linux_${arch}.deb"
            NFPM_ARCH="$arch" NFPM_BINARY="dist/soma_linux_${arch}" \
              nfpm package -f packaging/nfpm.yaml -p rpm -t "dist/somad-${NFPM_VERSION}-1.${rpmarch}.rpm"
          done

      - name: Stage source archive and Arch PKGBUILD
        env:
          VERSION: ${{ needs.prepare.outputs.tag }}
        run: scripts/stage-arch-release.sh "${VERSION#v}" dist

      - name: Generate checksums
        run: (cd dist && sha256sum -- * > ../checksums.txt && mv ../checksums.txt .)

      - uses: actions/upload-artifact@v7
        with:
          name: checksums
          path: dist/checksums.txt
          if-no-files-found: error

      - uses: actions/upload-artifact@v7
        if: inputs.dry_run == true
        with:
          name: release-artifacts
          path: |
            dist/*
            release-notes.md

      - uses: softprops/action-gh-release@v3
        if: inputs.dry_run == false
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ needs.prepare.outputs.sha }}
          body_path: release-notes.md
          make_latest: true
          files: dist/*
          fail_on_unmatched_files: true

  # ---------------------------------------------------------------- Homebrew tap
  homebrew:
    name: Render Homebrew tap files
    needs: [prepare, release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Download checksums
        uses: actions/download-artifact@v8
        with:
          name: checksums

      - name: Render tap files
        env:
          VERSION: ${{ needs.prepare.outputs.tag }}
        run: scripts/stage-homebrew.sh "${VERSION#v}" checksums.txt rendered

      - uses: actions/upload-artifact@v7
        with:
          name: homebrew-tap-files
          path: rendered/
          if-no-files-found: error

  publish-homebrew:
    name: Publish Homebrew tap
    needs: [prepare, homebrew]
    if: inputs.dry_run == false
    uses: samuelb/homebrew-tap/.github/workflows/publish.yml@main
    with:
      artifact_name: homebrew-tap-files
      commit_message: "somad ${{ needs.prepare.outputs.tag }}"
    secrets:
      tap_token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
