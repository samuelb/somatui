version: "2"

linters:
  enable:
    - gosec
    - govet
    - errcheck
    - staticcheck
    - unused
    - ineffassign
    - bidichk
    - bodyclose
    - contextcheck
    - durationcheck
    - gocritic
    - misspell
    - noctx
    - prealloc
    - reassign
    - sqlclosecheck
    - tparallel
    - unconvert
    - wastedassign

linters-settings:
  gosec:
    excludes:
      - G104  # Audit errors not checked (we use _ = intentionally)

issues:
  exclude-use-default: false
